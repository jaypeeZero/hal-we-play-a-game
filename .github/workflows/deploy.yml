name: Deploy

# Builds the game for Web, Linux, Windows and macOS on every push to the
# default branch and pushes every platform build to itch.io via butler.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.5"
  EXPORT_NAME: SpaceFleetManager

permissions:
  contents: read

# Never run two deploys at once; cancel an in-flight one if a new push lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: Export builds
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Web build
        run: |
          mkdir -v -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      - name: Linux build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux" build/linux/$EXPORT_NAME.x86_64

      - name: Windows build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/$EXPORT_NAME.exe

      - name: macOS build
        run: |
          mkdir -v -p build/macos
          godot --headless --verbose --export-release "macOS" build/macos/$EXPORT_NAME.zip

      - name: Upload all builds (for itch.io job)
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: build/

  deploy-itch:
    name: Publish to itch.io
    needs: export
    runs-on: ubuntu-latest
    # Skip if no itch.io target is configured.
    if: ${{ vars.ITCH_USER != '' && vars.ITCH_GAME != '' }}
    strategy:
      matrix:
        include:
          - channel: web
            path: build/web
          - channel: linux
            path: build/linux
          - channel: windows
            path: build/windows
          - channel: mac
            path: build/macos
    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: builds
          path: build

      - name: Push to itch.io (${{ matrix.channel }})
        uses: yeslayla/butler-publish-itchio-action@v1.0.3
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ matrix.channel }}
          ITCH_USER: ${{ vars.ITCH_USER }}
          ITCH_GAME: ${{ vars.ITCH_GAME }}
          PACKAGE: ${{ matrix.path }}
